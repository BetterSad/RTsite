<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Клинок, рассекающий демонов</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <aside class="sidebar" id="sidebar" aria-label="Навигация по уставу">
      <div class="sidebar__brand">
        <img class="brand-mark" src="https://i.postimg.cc/KzgjYjbL/Demon-Slayer-Kimetsu-No-Yaiba-Logo-PNG-Top-PNG-removebg-preview.png" alt="" aria-hidden="true" />
        <div>
          <p>Фракция</p>
          <strong>Демоноборческий корпус</strong>
        </div>
      </div>
      <div class="sidebar__mode-badge" id="sidebarModeBadge"></div>
      <nav class="sidebar__nav" id="navigation"></nav>
      <div class="sidebar__footer">
        <a class="sidebar__exit-link" id="sidebarExitLink" href="#home">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
          Вернуться в общий устав
        </a>
      </div>
    </aside>

    <div class="shell" id="shell">
      <header class="topbar">
        <button class="icon-button" id="menuButton" type="button" aria-label="Открыть меню">
          <span></span>
          <span></span>
          <span></span>
        </button>
        <a class="brand-link" href="#home" aria-label="На главную">
          <img
            src="https://i.postimg.cc/KzgjYjbL/Demon-Slayer-Kimetsu-No-Yaiba-Logo-PNG-Top-PNG-removebg-preview.png"
            alt="Логотип Корпуса Истребителей"
          />
          <span>Корпус Истребителей</span>
        </a>
        <!-- topbar links injected by JS -->
      </header>

      <main>
        <section class="hero" id="home">
          <div class="hero__image" aria-hidden="true"></div>
          <div class="hero__content">
            <img
              class="hero__logo"
              src="https://i.postimg.cc/KzgjYjbL/Demon-Slayer-Kimetsu-No-Yaiba-Logo-PNG-Top-PNG-removebg-preview.png"
              alt="Логотип Корпуса Истребителей"
            />
            <p class="eyebrow">Демоноборческий корпус</p>
            <h1>Устав Корпуса</h1>
            <p class="hero__quote">
              «Клинок держат не ради славы, а ради тех, кто не может защитить себя».
            </p>
          </div>
          <a class="scroll-cue" href="#charter" aria-label="Перейти к уставу"></a>
        </section>

        <section class="page" id="content" aria-live="polite"></section>
      </main>
    </div>

    <div class="overlay" id="overlay"></div>
    <script src="script.js"></script>
  </body>
</html>
